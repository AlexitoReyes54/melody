<!DOCTYPE html>
<html lang="en">

<head>

	<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
		integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
		crossorigin="anonymous">

	<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
		integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
		crossorigin="anonymous"></script>


	<meta charset="UTF-9">
	<title>leaderboard melody</title>
</head>

<body class="container bg-dark">
	<h1 class="mt-4 mb-4 text-white">Racking</h1>
	<table class="table table-striped table-dark">
		<thead>
			<tr>
				<th scope="col">Lugar</th>
				<th scope="col">Nombre</th>
				<th scope="col">Racha</th>
			</tr>
		</thead>
		<tbody id="tbody">
			<tr>
				<th scope="row">1</th>
				<td>Mark</td>
				<td>5</td>
			</tr>

		</tbody>
	</table>

	<script>
		async function getAllData() {
			try {
				const response = await fetch(`/rank`);

				if (!response.ok) throw new Error("Failed to fetch leaderboard");

				const data = await response.json(); // Parse the JSON data

				return data; // Returns the array of ranks
			} catch (error) {
				console.error("Error loading leaderboard:", error);
				return [];
			}
		}


		function addAllItemsToDom(items) {
			const tableBody = document.getElementById('tbody');
			tableBody.innerHTML = '';

			const sortedItems = [...items].sort((a, b) => b.streak - a.streak);

			sortedItems.forEach((item, index) => {
				const row = document.createElement('tr');

				row.innerHTML = `
            <th scope="row">${index + 1}</th>
            <td>${item.username}</td>
            <td>${item.streak} </td>
        `;

				tableBody.appendChild(row);
			});
		}

		document.addEventListener("DOMContentLoaded", async function () {
			let res = await getAllData()
			addAllItemsToDom(res.list)
		});

	</script>

</body>

</html>
